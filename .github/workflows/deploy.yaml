name: Build and Deploy via Docker Hub

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v
        required: true
        type: string
      source_ref:
        description: Source ref in heartalkai/heartie
        required: false
        default: refs/heads/main
        type: string
      source_sha:
        description: Optional source commit SHA in heartalkai/heartie
        required: false
        default: ''
        type: string
      docker_image:
        description: Docker image repository
        required: false
        default: chatanyai/heartie
        type: string
      publish_latest:
        description: Also push latest tag
        required: false
        default: true
        type: boolean

env:
  SOURCE_REPO: heartalkai/heartie
  DEFAULT_DOCKER_IMAGE: chatanyai/heartie

jobs:
  prepare:
    name: Resolve server release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      source_repo: ${{ steps.meta.outputs.source_repo }}
      source_ref: ${{ steps.meta.outputs.source_ref }}
      source_sha: ${{ steps.meta.outputs.source_sha }}
      docker_image: ${{ steps.meta.outputs.docker_image }}
      publish_latest: ${{ steps.meta.outputs.publish_latest }}
    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve metadata
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEFAULT_SOURCE_REPO: ${{ env.SOURCE_REPO }}
          DEFAULT_DOCKER_IMAGE: ${{ env.DEFAULT_DOCKER_IMAGE }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
          INPUT_SOURCE_SHA: ${{ inputs.source_sha }}
          INPUT_DOCKER_IMAGE: ${{ inputs.docker_image }}
          INPUT_PUBLISH_LATEST: ${{ inputs.publish_latest }}
        run: |
          set -euo pipefail

          extract_field() {
            local text="$1"
            local key="$2"
            printf '%s\n' "$text" | sed -n "s/^${key}:[[:space:]]*//p" | head -n 1
          }

          if [[ "$EVENT_NAME" == "push" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            if [[ ! "$TAG_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              echo "Unsupported tag format: $TAG_NAME" >&2
              exit 1
            fi
            VERSION="${BASH_REMATCH[1]}"
            TAG_MESSAGE="$(git tag -l --format='%(contents)' "$TAG_NAME")"
            SOURCE_REPO="$(extract_field "$TAG_MESSAGE" 'source-repo')"
            SOURCE_REF="$(extract_field "$TAG_MESSAGE" 'source-ref')"
            SOURCE_SHA="$(extract_field "$TAG_MESSAGE" 'source-sha')"
            DOCKER_IMAGE="$DEFAULT_DOCKER_IMAGE"
            PUBLISH_LATEST="true"
          else
            VERSION="$INPUT_VERSION"
            SOURCE_REPO="$DEFAULT_SOURCE_REPO"
            SOURCE_REF="$INPUT_SOURCE_REF"
            SOURCE_SHA="$INPUT_SOURCE_SHA"
            DOCKER_IMAGE="$INPUT_DOCKER_IMAGE"
            PUBLISH_LATEST="$INPUT_PUBLISH_LATEST"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Version must match x.y.z" >&2
              exit 1
            fi
          fi

          if [[ -z "$SOURCE_REPO" ]]; then
            SOURCE_REPO="$DEFAULT_SOURCE_REPO"
          fi
          if [[ -z "$SOURCE_REF" ]]; then
            SOURCE_REF="refs/heads/main"
          fi
          if [[ -z "$DOCKER_IMAGE" ]]; then
            DOCKER_IMAGE="$DEFAULT_DOCKER_IMAGE"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "source_repo=$SOURCE_REPO" >> "$GITHUB_OUTPUT"
          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "docker_image=$DOCKER_IMAGE" >> "$GITHUB_OUTPUT"
          echo "publish_latest=$PUBLISH_LATEST" >> "$GITHUB_OUTPUT"

  build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@v4

      - name: Checkout source repo
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          SOURCE_REPO: ${{ needs.prepare.outputs.source_repo }}
          SOURCE_REF: ${{ needs.prepare.outputs.source_ref }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
        run: ./scripts/ci/checkout-source.sh heartie-source

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build tag list
        id: tags
        shell: bash
        env:
          DOCKER_IMAGE: ${{ needs.prepare.outputs.docker_image }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PUBLISH_LATEST: ${{ needs.prepare.outputs.publish_latest }}
        run: |
          set -euo pipefail
          {
            echo 'tags<<EOF'
            echo "${DOCKER_IMAGE}:${VERSION}"
            if [[ "$PUBLISH_LATEST" == "true" ]]; then
              echo "${DOCKER_IMAGE}:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./heartie-source/heartalkai-go
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
